<script>
    var ispreview = '';
    function checkIframeLoaded(){
        var nameeleWidth = 890; // width set to 890px default ;
        var nameright = nameeleWidth/2;

        var nameleftposition = $(document).find('#namepositionleft').val();
        var namerslt = parseFloat(nameleftposition) - parseFloat(nameright);
        

        var issueDateeleWidth = 890// width set to 890px default ;
        var issueDateright = issueDateeleWidth/2;

        var issueDateleftposition = $(document).find('#issueDatepositionleft').val();

        var issueDaterslt = parseFloat(issueDateleftposition) - parseFloat(issueDateright);

        $(document).find('.stuName').css('left', namerslt+'px');
        $(document).find('.stuissueDate').css('left', issueDaterslt+'px');

        if(ispreview == ''){
            setTimeout(() => {
                generatePDFv2();	
            },1000);
        }
    }

    function generatePDFv2() {
        var element = document.getElementById('certi-contents');
        var opt = {
            margin: -2,
            padding: 0,
            filename:     'Sunil Kumar.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 1, useCORS: true},
            //jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' },
            jsPDF:        { unit: 'mm', format: [235, 183], orientation: 'landscape' },
            pagebreak: { mode: 'avoid-all', before: '#page2el' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
